<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Compras - P-IRIS</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/historial.css">
</head>
<body>
    <nav class="navbar-iris">
        <div class="container">
            <a href="/" class="logo">P-IRIS</a>
            <div class="nav-links">
                <a href="/">Ver catálogo</a>
                <a href="/historial.html" class="nav-active">Historial</a>
                <span data-auth-nav data-auth-current="historial" class="auth-nav"></span>
            </div>
        </div>
    </nav>

    <main class="historial-container">
        <div class="historial-header">
            <h1>Historial de Compras</h1>
            <p>Consulta los cursos que has comprado.</p>
        </div>

        <div class="historial-card">
            <table class="historial-table">
                <thead>
                    <tr>
                        <th>Curso</th>
                        <th>Fecha de compra</th>
                        <th>Estado</th>
                        <th>Acceso</th>
                    </tr>
                </thead>
                <tbody id="historialBody">
                    <tr>
                        <td colspan="4" class="historial-empty">Cargando historial...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="historial-header certificados-header">
            <h1>Mis Certificados</h1>
            <p>Certificados obtenidos al acceder al contenido de tus cursos.</p>
        </div>

        <div class="historial-card">
            <table class="historial-table">
                <thead>
                    <tr>
                        <th>Curso</th>
                        <th>Fecha de emisión</th>
                        <th>Certificado</th>
                    </tr>
                </thead>
                <tbody id="certificadosBody">
                    <tr>
                        <td colspan="3" class="historial-empty">Cargando certificados...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/historial.js"></script>
</body>
</html>
