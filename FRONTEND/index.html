<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P-IRIS - Cursos de Iris Gólvez</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/carrito.css">
  <link rel="stylesheet" href="css/pago.css">
</head>
<body>
  <nav class="navbar-iris">
    <div class="container">
      <a href="/" class="logo">P-IRIS</a>
      <div class="nav-links">
        <a href="/">Inicio</a>
        <a href="/">Cursos</a>
        <a href="/">Contacto</a>
        <span data-auth-nav class="auth-nav"><a href="/login.html">Iniciar sesión</a></span>
        <button id="btn-carrito" class="btn-carrito" aria-label="Carrito">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span id="carrito-badge" class="carrito-badge" style="display:none;">0</span>
        </button>
      </div>
    </div>
  </nav>

  <header class="hero">
    <h1>Cursos y Talleres de Iris Gólvez</h1>
    <p>Psicóloga - Master en Ética, Liderazgo y Trabajo en Equipo</p>
  </header>

  <main class="main-content">
    <section class="section-title">
      <h2>Cursos Disponibles</h2>
    </section>

    <div class="filtros-container">
      <div class="filtros-single-row">
        <input type="text" id="busqueda-input" placeholder="Buscar cursos...">
        <select id="categoria-select">
          <option value="">Todas las categorías</option>
        </select>
        <select id="ordenar-select">
          <option value="relevancia">Ordenar por</option>
          <option value="fecha">Más recientes</option>
          <option value="precio_asc">Precio: menor a mayor</option>
          <option value="precio_desc">Precio: mayor a menor</option>
        </select>
        <input type="number" id="precio-min" placeholder="Mín $" min="0">
        <input type="number" id="precio-max" placeholder="Máx $" min="0">
        <button id="limpiar-filtros" class="btn-secondary btn-sm">Limpiar</button>
      </div>
    </div>

    <section id="cursos-container" class="cursos-grid"></section>

    <div id="pagination" class="pagination"></div>
  </main>

  <footer class="footer-iris">
    <p>&copy; 2026 P-IRIS - Plataforma de Cursos. Todos los derechos reservados.</p>
  </footer>

  <div id="modal-curso" class="modal" style="display: none;">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <img id="modal-imagen" src="" alt="">
      <span id="modal-categoria" class="modal-badge"></span>
      <h2 id="modal-titulo"></h2>
      <p id="modal-descripcion" class="modal-desc"></p>
      <div class="modal-meta">
        <span id="modal-duracion" class="modal-duracion"></span>
      </div>
      <div class="modal-footer">
        <span id="modal-precio" class="badge-precio"></span>
        <button class="btn-primary" id="modal-agregar">Agregar al carrito</button>
        <button id="modal-acceder" class="btn-secondary">Acceder al contenido</button>
      </div>
    </div>
  </div>

  <!-- Carrito drawer -->
  <div id="carrito-overlay" class="carrito-overlay" style="display:none;"></div>
  <aside id="carrito-drawer" class="carrito-drawer">
    <div class="carrito-header">
      <h2>Mi Carrito</h2>
      <button id="carrito-close" class="carrito-close">&times;</button>
    </div>
    <div id="carrito-lista" class="carrito-lista"></div>
    <div id="carrito-resumen" class="carrito-resumen"></div>
    <div class="carrito-footer">
      <div id="checkout-auth-msg" class="checkout-auth-msg" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Debes <a href="/login.html">iniciar sesión</a> para continuar con la compra.
      </div>
      <button class="btn-checkout" id="btn-checkout">Ir a pagar</button>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/skeleton.js"></script>
  <script src="js/carrito.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/pago.js"></script>
</body>
</html>
