<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-IRIS - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    </head>
    <body class="login-page">
    <nav class="navbar-iris">
        <div class="container">
        <a href="/" class="logo">P-IRIS</a>
        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/">Cursos</a>
            <a href="/">Contacto</a>
            <a href="/login.html" class="nav-active">Iniciar Sesión</a>
        </div>
        </div>
    </nav>

    <main class="login-main">
        <section class="login-card" aria-labelledby="login-title">
        <div class="login-header">
            <span class="login-badge">Bienvenido</span>
            <h1 id="login-title">Iniciar Sesión</h1>
            <p>Accede a tu cuenta para continuar aprendiendo con P-IRIS.</p>
        </div>

        <div id="login-alert" class="login-alert" style="display: none;"></div>

        <form class="login-form" id="login-form" novalidate>
            <div class="form-group">
            <label for="email">Correo electrónico <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" autocomplete="email" required>
            </div>

            <div class="form-group">
            <label for="password">Contraseña <span class="required">*</span></label>
            <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" required>
            </div>

            <div class="login-options">
            <label class="remember-option" for="remember">
                <input type="checkbox" id="remember" name="remember">
                <span>Recordarme</span>
            </label>
            <a href="#" class="login-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-primary login-submit" id="login-submit">Entrar</button>
        </form>

        <div class="login-footer">
            <p>¿No tienes cuenta? <a href="#" class="login-link">Regístrate aquí</a></p>
            <a href="/" class="btn-secondary login-back">Volver al catálogo</a>
        </div>
        </section>
    </main>

    <footer class="footer-iris login-footer-page">
        <p>&copy; 2026 P-IRIS - Plataforma de Cursos. Todos los derechos reservados.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
